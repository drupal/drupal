  Drupal\Core\Form\FormErrorHandlerInterface: '@form_error_handler'
  form_cache:
    class: Drupal\Core\Form\FormCache
    autowire: true
    arguments:
      $root: '%app.root%'
      $logger: '@logger.channel.form'
    public: false  # Private to form_builder
  Drupal\Core\Form\FormCacheInterface: '@form_cache'
  keyvalue:
    class: Drupal\Core\KeyValueStore\KeyValueFactory
    autowire: true
    arguments:
      $options: '%factory.keyvalue%'
  Drupal\Core\KeyValueStore\KeyValueFactoryInterface: '@keyvalue'
  keyvalue.database:
    class: Drupal\Core\KeyValueStore\KeyValueDatabaseFactory
    autowire: true
    arguments:
      $serializer: '@serialization.phpserialize'
  keyvalue.expirable:
    class: Drupal\Core\KeyValueStore\KeyValueExpirableFactory
    autowire: true
    arguments:
      $options: '%factory.keyvalue.expirable%'
  Drupal\Core\KeyValueStore\KeyValueExpirableFactoryInterface: '@keyvalue.expirable'
  keyvalue.expirable.database:
    class: Drupal\Core\KeyValueStore\KeyValueDatabaseExpirableFactory
    autowire: true
    arguments:
      $serializer: '@serialization.phpserialize'
  logger.factory:
    class: Drupal\Core\Logger\LoggerChannelFactory
    parent: container.trait
    tags:
      - { name: service_collector, tag: logger, call: addLogger }
  Drupal\Core\Logger\LoggerChannelFactoryInterface: '@logger.factory'
  logger.channel_base:
    abstract: true
    class: Drupal\Core\Logger\LoggerChannel
    factory: ['@logger.factory', 'get']
  logger.channel.default:
    parent: logger.channel_base
    arguments: ['system']
  logger.channel.php:
    parent: logger.channel_base
    arguments: ['php']
  logger.channel.image:
    parent: logger.channel_base
    arguments: ['image']
  logger.channel.cron:
    parent: logger.channel_base
    arguments: ['cron']
  logger.channel.file:
    class: Drupal\Core\Logger\LoggerChannel
    factory: ['@logger.factory', 'get']
