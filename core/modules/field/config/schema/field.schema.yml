# Schema for configuration files of the Field module.

field.settings:
  type: config_object
  label: 'Field settings'
  deprecated: "The 'field.settings' config is deprecated in drupal:11.4.0 and is removed from drupal:13.0.0. Use the field_purge_batch_size setting instead. See https://www.drupal.org/node/3494023."
  constraints:
    FullyValidatable: ~
  mapping:
    purge_batch_size:
      type: integer
      label: 'Maximum number of field data records to purge'
      constraints:
        NotNull: []
        Range:
          min: 1

field.storage.*.*:
  type: config_entity
  label: 'Field'
  mapping:
    id:
      type: string
      label: 'ID'
    field_name:
      type: string
      label: 'Field name'
    entity_type:
      type: string
      label: 'Entity type'
    type:
      type: string
      label: 'Type'
      constraints:
        PluginExists:
          manager: plugin.manager.field.field_type
          interface: '\Drupal\Core\Field\FieldItemInterface'
    settings:
      type: field.storage_settings.[%parent.type]
    module:
      type: string
      label: 'Module'
    locked:
      type: boolean
      label: 'Locked'
    cardinality:
      type: integer
      label: 'Maximum number of values users can enter'
    translatable:
      type: boolean
      label: 'Translatable'
    indexes:
      type: sequence
      label: 'Indexes'
      constraints:
        FieldStorageIndexes: ~
      sequence:
        type: sequence
        label: 'Indexes'
        sequence:
          type: ignore
          label: 'Index'
    persist_with_no_fields:
      type: boolean
      label: 'Persist field storage with no fields'
    custom_storage:
      type: boolean
      label: 'Enable custom storage'

field.field.*.*.*:
  type: field_config_base
  label: 'Field'
  constraints:
    FullyValidatable: ~
